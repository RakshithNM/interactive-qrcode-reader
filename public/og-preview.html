<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive QR Reader Open Graph Preview</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./og-preview.css" />
  </head>
  <body>
    <main class="og-frame">
      <section class="og-copy">
        <p class="eyebrow">Interactive QR Reader</p>
        <h1>See how QR logic fits together.</h1>
        <p class="lede">
          Trace structure, Reed-Solomon error correction, and masking through
          one exploded view.
        </p>

        <div class="chip-row" aria-hidden="true">
          <span class="chip chip-coral">Exploded view</span>
          <span class="chip chip-blue">Error correction</span>
          <span class="chip chip-green">Masking</span>
        </div>
      </section>

      <section class="og-visual">
        <div class="visual-shell">
          <div class="visual-head">
            <span>Interactive explainer</span>
          </div>

          <div class="media-stage">
            <div class="media-wash media-wash-blue"></div>
            <div class="media-wash media-wash-coral"></div>
            <img
              src="./exploded.png"
              alt="Exploded QR code logic map"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
